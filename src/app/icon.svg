<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Avenue Locksmith">
  <title>Avenue Locksmith</title>

  <!-- ===== Locksmith figure ===== -->

  <!-- Fedora hat crown -->
  <path d="M52 36 Q52 16 82 16 Q112 16 112 36" />
  <!-- Fedora hat brim -->
  <ellipse cx="82" cy="40" rx="52" ry="5" />
  <!-- Hat band -->
  <line x1="52" y1="36" x2="112" y2="36" />

  <!-- Head -->
  <circle cx="82" cy="58" r="12" />
  <!-- Beard line -->
  <path d="M72 62 Q82 70 92 62" />
  <!-- Neck strokes -->
  <line x1="76" y1="70" x2="76" y2="82" />
  <line x1="88" y1="70" x2="88" y2="82" />

  <!-- Shoulder curve -->
  <path d="M62 86 Q82 78 102 86" />
  <!-- Torso side edges -->
  <line x1="62" y1="86" x2="54" y2="100" />
  <line x1="102" y1="86" x2="110" y2="100" />
  <line x1="54" y1="100" x2="54" y2="162" />
  <line x1="110" y1="100" x2="110" y2="162" />
  <line x1="54" y1="162" x2="110" y2="162" />

  <!-- Overalls bib -->
  <path d="M68 94 L68 128 L96 128 L96 94" />
  <!-- Straps -->
  <line x1="68" y1="94" x2="64" y2="84" />
  <line x1="96" y1="94" x2="100" y2="84" />
  <!-- Buttons -->
  <circle cx="71" cy="99" r="2" />
  <circle cx="93" cy="99" r="2" />

  <!-- Legs -->
  <path d="M60 162 L58 218 L78 218 L80 162" />
  <path d="M84 162 L86 218 L106 218 L108 162" />

  <!-- Left arm hanging at side -->
  <path d="M54 100 Q40 120 44 140 Q46 148 54 146" />

  <!-- Right arm extended toward key -->
  <path d="M110 100 Q128 94 144 100" />
  <!-- Right hand -->
  <circle cx="148" cy="102" r="3" />

  <!-- ===== Key ===== -->

  <!-- Key bow (outer ring) -->
  <circle cx="182" cy="92" r="30" />
  <!-- Key bow (inner hole) -->
  <circle cx="182" cy="92" r="13" />

  <!-- Key shaft (two parallel strokes) -->
  <line x1="178" y1="122" x2="178" y2="222" />
  <line x1="186" y1="122" x2="186" y2="222" />
  <line x1="178" y1="222" x2="186" y2="222" />

  <!-- Key bit / teeth -->
  <path d="M186 196 L200 196 L200 204 L192 204 L192 212 L186 212" />
</svg>
